name: Meta Username Continuous Claimer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'     # every 6 hours fallback

permissions:
  contents: write

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Playwright)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libnspr4 libdbus-1-3 \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libatspi2.0-0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 \
            libasound2 fonts-liberation xvfb

      - name: Install Python packages + Playwright (with auto deps)
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Run claimer in loop
        run: python claimer.py
