name: Meta Username Continuous Claimer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'     # every 6 hours fallback

permissions:
  contents: write

jobs:
  run-claimer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal system deps for Chromium on Ubuntu 24.04
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libatspi2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libglib2.0-0 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation \
            xvfb

      - name: Install Playwright + Chromium browser
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests playwright
          playwright install chromium

      - name: Run claimer in loop
        run: python claimer.py
